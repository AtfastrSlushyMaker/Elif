<div class="min-h-screen bg-gradient-to-b from-white via-brand-yellow/10 to-brand-peach/20 py-10 px-4 md:px-8">
  <div class="max-w-7xl mx-auto">
    <!-- Search Bar -->
    <div class="mb-8">
      <input 
        #searchInput
        type="text" 
        placeholder="Search products..." 
        (input)="search(searchInput.value)"
        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
      />
    </div>

    <!-- Category Filter -->
    <div class="mb-8">
      <h3 class="font-bold text-gray-900 mb-3">Filter by Category</h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <button 
          *ngFor="let cat of categories"
          (click)="filterByCategory(cat.id)"
          [class.bg-brand-yellow]="selectedCategory === cat.id"
          [class.bg-gray-200]="selectedCategory !== cat.id"
          class="px-4 py-2 rounded-lg font-semibold transition"
        >
          {{ cat.label }}
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-8">
      <p class="text-gray-500">Loading products...</p>
    </div>

    <!-- Products Grid -->
    <div *ngIf="!loading" class="grid md:grid-cols-2 lg:grid-cols-4 gap-5">
      <div 
        *ngFor="let product of filteredProducts"
        class="rounded-2xl border border-gray-200 bg-white overflow-hidden shadow-sm hover:shadow-lg transition cursor-pointer"
        (click)="viewProductDetails(product.id)"
      >
        <!-- Product Image -->
        <img 
          [src]="product.imageUrl || 'images/stock/golden-retriever.jpg'" 
          [alt]="product.name"
          class="w-full h-40 object-cover"
        />

        <!-- Product Info -->
        <div class="p-4">
          <h3 class="font-bold text-gray-900 truncate">{{ product.name }}</h3>
          <p class="text-xs text-gray-500 mt-1">{{ product.category }}</p>
          <p class="text-sm text-gray-600 mt-2 line-clamp-2">{{ product.description }}</p>

          <!-- Price and Stock -->
          <div class="mt-3 flex justify-between items-center">
            <span class="font-bold text-lg text-brand-yellow">${{ product.price | number: '1.2-2' }}</span>
            <span class="text-xs text-gray-500">
              <span *ngIf="product.stock > 0" class="text-green-600">In stock</span>
              <span *ngIf="product.stock <= 0" class="text-red-600">Out of stock</span>
            </span>
          </div>

          <!-- Add to Cart Button -->
          <button 
            (click)="addToCart(product); $event.stopPropagation()"
            [disabled]="product.stock <= 0 || !isLoggedIn"
            class="w-full mt-3 px-3 py-2 bg-brand-yellow text-white rounded-lg font-semibold hover:bg-yellow-500 disabled:bg-gray-300 disabled:cursor-not-allowed transition"
          >
            {{ !isLoggedIn ? 'Login to Buy' : product.stock > 0 ? 'Add to Cart' : 'Out of Stock' }}
          </button>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && filteredProducts.length === 0" class="text-center py-12">
      <p class="text-gray-500 text-lg">No products found matching your criteria</p>
    </div>
  </div>
</div>
