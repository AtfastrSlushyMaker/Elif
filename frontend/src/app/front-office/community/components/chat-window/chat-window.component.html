<section class="community-page min-h-screen bg-slate-50 py-10 px-4 md:px-8">
  <div class="max-w-4xl mx-auto rounded-xl border border-slate-300 bg-white overflow-hidden">
    <header class="relative px-6 py-5 border-b border-gray-200 overflow-hidden">
      <img src="images/stock/vet-examining.jpg" alt="" aria-hidden="true" class="absolute inset-0 w-full h-full object-cover opacity-10">
      <div class="relative flex items-center justify-between">
        <h1 class="text-xl font-black text-gray-900"><i class="fas fa-comment-dots mr-2 text-brand-teal"></i>Chat Room</h1>
        <img src="images/animals/chick.png" alt="" aria-hidden="true" class="h-9 opacity-70 hidden sm:block">
      </div>
    </header>

    <div class="p-6 h-[520px] overflow-y-auto space-y-3 bg-slate-50" #messagesContainer>
      <div *ngIf="loading" class="text-gray-500"><i class="fas fa-spinner fa-spin mr-2 text-brand-teal"></i>Loading messages...</div>
      <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3">{{ error }}</div>

      <div *ngFor="let m of messages; let i = index" class="chat-message-bubble max-w-[82%] rounded-2xl px-4 py-3 shadow-sm" [style.--motion-index]="i" [ngClass]="{
        'chat-message-self ml-auto bg-brand-teal text-white motion-message-self': m.senderId === userId,
        'chat-message-other bg-white border border-gray-200 text-gray-800 motion-message-other': m.senderId !== userId
      }">
        <p class="text-xs font-bold mb-1" [ngClass]="m.senderId === userId ? 'text-white/90' : 'text-brand-teal'">{{ m.senderName || 'Unknown User' }}</p>
        <p class="leading-relaxed">{{ m.content }}</p>
        <p class="text-xs mt-1" [ngClass]="m.senderId === userId ? 'text-white/80' : 'text-gray-500'">{{ m.createdAt | date:'short' }}</p>
      </div>

      <div *ngIf="!loading && !messages.length" class="text-gray-500 text-center pt-16">
        <i class="fas fa-comments text-brand-teal mr-1"></i>No messages yet.
      </div>
    </div>

    <footer class="p-4 border-t border-gray-200 bg-white flex gap-3">
      <input
        [(ngModel)]="draft"
        id="chat-draft"
        name="chatDraft"
        type="text"
        aria-label="Type your message"
        autocomplete="off"
        (keydown.enter)="send()"
        class="flex-1 border border-gray-300 rounded-xl px-4 py-3 focus:border-brand-teal focus:ring-1 focus:ring-brand-teal outline-none"
        placeholder="Type a message...">
      <button type="button" (click)="send()" class="min-h-[44px] min-w-[44px] px-5 py-3 bg-brand-teal text-white rounded-xl font-semibold hover:bg-teal-700 transition-colors duration-200" aria-label="Send message">
        <i class="fas fa-paper-plane"></i>
      </button>
    </footer>
  </div>
</section>
