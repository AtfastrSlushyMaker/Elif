<div class="border border-gray-200 rounded-2xl p-4 bg-white/95 shadow-sm" [style.marginLeft.px]="depth * 16">
  <div class="flex items-start gap-3">
    <app-vote-buttons [score]="comment.voteScore" (voted)="onVote($event)"></app-vote-buttons>
    <div class="flex-1">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-xs text-gray-500 font-semibold"><i class="fas fa-user mr-1 text-brand-teal"></i>{{ comment.authorName || 'Unknown User' }}</span>
        <span *ngIf="comment.acceptedAnswer" class="text-xs bg-brand-teal/10 text-brand-teal px-2 py-1 rounded-full">
          <i class="fas fa-check-circle mr-1"></i>Accepted Answer
        </span>
      </div>
      <p class="text-gray-800">{{ comment.content }}</p>
      <img *ngIf="comment.imageUrl" [src]="comment.imageUrl" alt="Comment attachment" class="mt-2 w-full max-h-72 rounded-xl object-cover border border-gray-200">

      <div class="flex items-center gap-3 mt-2">
        <button
          *ngIf="canAccept"
          (click)="acceptAnswer()"
          class="px-3 py-1 text-sm bg-brand-teal text-white rounded-lg hover:bg-teal-700 transition-colors font-semibold">
          <i class="fas fa-check mr-1"></i>Accept Answer
        </button>
        <button
          (click)="showReplyForm = !showReplyForm"
          class="text-xs text-brand-teal hover:underline font-semibold">
          <i class="fas fa-reply mr-1"></i>{{ showReplyForm ? 'Cancel' : 'Reply' }}
        </button>
      </div>

      <!-- Inline reply form -->
      <form *ngIf="showReplyForm" (ngSubmit)="submitReply()" class="mt-3">
        <textarea
          [(ngModel)]="replyContent"
          name="replyContent"
          rows="2"
          maxlength="2000"
          placeholder="Write a reply..."
          class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-teal resize-none bg-white"></textarea>
        <div class="mt-1 flex items-center justify-between text-xs">
          <p class="text-gray-500">Keep replies concise and actionable.</p>
          <span class="text-gray-400">{{ (replyContent || '').length }}/2000</span>
        </div>
        <input [id]="replyImageInputId" type="file" accept="image/*" (change)="onReplyImagePicked($event)" class="hidden">
        <label [for]="replyImageInputId" class="inline-flex mt-2 items-center gap-2 px-3 py-2 border border-gray-300 rounded-xl bg-white text-xs font-medium text-gray-700 cursor-pointer hover:bg-gray-50">
          <i class="fas fa-paperclip text-brand-teal"></i>Attach image
        </label>
        <button *ngIf="replyImageUrl" type="button" (click)="clearReplyImage()" class="ml-2 text-xs text-red-600 hover:text-red-700">
          <i class="fas fa-xmark mr-1"></i>Remove
        </button>
        <img *ngIf="replyImageUrl" [src]="replyImageUrl" alt="Reply image preview" class="mt-2 w-full max-h-56 rounded-xl object-cover border border-gray-200">
        <div class="flex justify-end mt-1">
          <button
            type="submit"
            [disabled]="(!replyContent.trim() && !replyImageUrl) || submittingReply"
            class="px-3 py-1 bg-brand-teal text-white text-xs font-medium rounded-xl hover:bg-teal-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            {{ submittingReply ? 'Posting...' : 'Post Reply' }}
          </button>
        </div>
      </form>

      <div class="mt-3 space-y-3" *ngIf="comment.replies.length">
        <app-comment-tree
          *ngFor="let child of comment.replies"
          [comment]="child"
          [postId]="postId"
          [postOwnerId]="postOwnerId"
          [postType]="postType"
          [depth]="depth + 1"
          [userId]="userId"
          (accept)="accept.emit($event)">
        </app-comment-tree>
      </div>
    </div>
  </div>
</div>
