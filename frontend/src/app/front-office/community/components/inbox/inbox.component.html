<section class="community-page min-h-screen bg-slate-50 py-10 px-4 md:px-8">
  <div class="max-w-4xl mx-auto rounded-xl border border-slate-300 bg-white p-6 md:p-8">
    <div class="flex items-start justify-between gap-4 mb-6">
      <div>
        <h1 class="text-3xl font-black text-gray-900"><i class="fas fa-inbox mr-2 text-brand-teal"></i>Inbox</h1>
        <p class="text-gray-600 mt-1">Your direct community conversations in one place.</p>
      </div>
      <img src="images/animals/hamster.png" alt="" aria-hidden="true" class="h-10 hidden sm:block opacity-70">
    </div>

    <div class="mb-4 rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-600 flex items-center gap-2">
      <i class="fas fa-circle-info text-brand-teal"></i>
      Select a conversation to continue where you left off.
    </div>

    <div *ngIf="loading" class="text-gray-500"><i class="fas fa-spinner fa-spin mr-2 text-brand-teal"></i>Loading inbox...</div>
    <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3">{{ error }}</div>

    <div class="space-y-3" *ngIf="!loading && !error">
      <button
        *ngFor="let c of conversations; let i = index"
        (click)="open(c.id)"
        [style.--motion-index]="i"
        [attr.aria-label]="'Open conversation with ' + (c.counterpartName || 'Unknown User')"
        class="inbox-conversation-item w-full text-left p-4 border border-gray-200 rounded-xl bg-white hover:border-brand-teal hover:bg-brand-teal/5 transition-all duration-300">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-3 min-w-0">
            <span class="h-11 w-11 rounded-full bg-brand-teal/15 text-brand-teal flex items-center justify-center shrink-0">
              <i class="fas fa-user"></i>
            </span>
            <div class="min-w-0">
              <p class="font-bold text-gray-900 truncate">{{ c.counterpartName || 'Unknown User' }}</p>
              <p class="text-sm text-gray-500 truncate"><i class="fas fa-clock mr-1"></i>{{ c.lastMessageAt ? (c.lastMessageAt | date:'medium') : 'No messages yet' }}</p>
            </div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full font-semibold" [ngClass]="c.unreadCount > 0 ? 'bg-brand-orange/20 text-brand-orange' : 'bg-gray-100 text-gray-500'">
            {{ c.unreadCount }} unread
          </span>
        </div>
      </button>

      <div *ngIf="conversations.length === 0" class="text-gray-500 border border-dashed border-gray-300 rounded-xl p-8 text-center bg-white">
        <i class="fas fa-message mr-1 text-brand-teal"></i>No conversations yet.
      </div>
    </div>
  </div>
</section>
