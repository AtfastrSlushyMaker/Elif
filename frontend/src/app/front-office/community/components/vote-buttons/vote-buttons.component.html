<div class="inline-flex min-w-12 shrink-0 flex-col items-center rounded-2xl border border-slate-200 bg-slate-50 px-1.5 py-1.5">
  <button
    (click)="vote(1)"
    type="button"
    [attr.aria-pressed]="userVote === 1"
    class="h-8 w-8 rounded-xl focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-teal/40"
    [ngClass]="userVote === 1 ? 'bg-brand-teal/10 text-brand-teal' : 'text-slate-500 hover:bg-white hover:text-brand-teal'"
    aria-label="Upvote">
    <i class="fas fa-chevron-up"></i>
  </button>
  <span class="py-1 text-xs font-bold" [ngClass]="userVote === 1 ? 'text-brand-teal' : userVote === -1 ? 'text-brand-red' : 'text-slate-700'">
    {{ scoreLabel }}
  </span>
  <button
    (click)="vote(-1)"
    type="button"
    [attr.aria-pressed]="userVote === -1"
    class="h-8 w-8 rounded-xl focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-red/40"
    [ngClass]="userVote === -1 ? 'bg-brand-red/10 text-brand-red' : 'text-slate-500 hover:bg-white hover:text-brand-red'"
    aria-label="Downvote">
    <i class="fas fa-chevron-down"></i>
  </button>
</div>
