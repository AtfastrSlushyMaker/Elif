<div class="flex flex-col items-center rounded-xl border border-gray-200 bg-gray-50 px-2 py-2 min-w-12">
  <button
    (click)="vote(1)"
    class="h-7 w-7 rounded-md text-gray-500 hover:text-brand-teal hover:bg-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-teal/40"
    aria-label="Upvote">
    <i class="fas fa-chevron-up"></i>
  </button>
  <span class="text-sm font-bold text-gray-800 py-1">{{ score }}</span>
  <button
    (click)="vote(-1)"
    class="h-7 w-7 rounded-md text-gray-500 hover:text-brand-red hover:bg-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-red/40"
    aria-label="Downvote">
    <i class="fas fa-chevron-down"></i>
  </button>
</div>
