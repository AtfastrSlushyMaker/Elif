<div *ngIf="open" class="community-mention-picker rounded-2xl border border-sky-200 bg-white p-2 shadow-xl">
  <p class="px-2 pb-2 text-[11px] font-semibold uppercase tracking-[0.12em] text-sky-600">{{ label }}</p>

  <button
    *ngFor="let suggestion of suggestions; let idx = index"
    type="button"
    class="community-mention-picker-item"
    [class.community-mention-picker-item-active]="idx === activeIndex"
    (mousedown)="$event.preventDefault()"
    (click)="choose(suggestion)">
    <span class="community-mention-picker-handle">&#64;{{ suggestion.handle }}</span>
    <span class="community-mention-picker-name">{{ suggestion.displayName }}</span>
  </button>
</div>
