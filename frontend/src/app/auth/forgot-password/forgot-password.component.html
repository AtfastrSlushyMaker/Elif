<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-brand-teal/10 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
  <div class="absolute top-1/2 -right-24 w-96 h-96 bg-brand-orange/10 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob [animation-delay:2s]"></div>
  <div class="absolute -bottom-24 left-1/4 w-96 h-96 bg-brand-teal/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob [animation-delay:4s]"></div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div class="flex justify-center mb-6 relative">
      <a routerLink="/app">
        <img class="mx-auto h-20 w-auto object-contain transform hover:scale-105 transition-transform duration-300 drop-shadow-sm" src="images/logo/logo-cropped-transparent.png" alt="Elif">
      </a>
    </div>
    <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 leading-tight">
      Reset your password
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Enter your email and we'll send you a link to reset your password.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div class="bg-white/95 backdrop-blur-md py-8 px-4 shadow sm:rounded-2xl sm:px-10 border border-gray-100 animate-fade-in-up">
      <!-- Success Message -->
      <div *ngIf="submitted && success" class="mb-6 bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm">
        <div class="flex items-start">
          <i class="fas fa-check-circle mr-3 mt-0.5 flex-shrink-0"></i>
          <div>
            <p class="font-medium">Check your email</p>
            <p class="mt-1">{{ success }}</p>
            <button 
              type="button"
              (click)="backToLogin()" 
              class="mt-3 text-green-800 hover:text-green-900 font-medium text-sm underline">
              Back to login
            </button>
          </div>
        </div>
      </div>

      <!-- Form (shown only if not submitted) -->
      <form *ngIf="!submitted" class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">
            Email address
          </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-envelope text-gray-400"></i>
            </div>
            <input 
              formControlName="email" 
              id="email" 
              type="email" 
              autocomplete="email" 
              [class.border-red-400]="form.get('email')!.invalid && form.get('email')!.touched" 
              class="focus:ring-brand-teal focus:border-brand-teal block w-full pl-10 sm:text-sm border-gray-300 rounded-lg py-3 px-4 bg-gray-50/50 border hover:bg-white focus:bg-white transition-all outline-none" 
              placeholder="you@example.com">
          </div>
          <p *ngIf="form.get('email')!.touched && form.get('email')!.invalid" class="mt-1 text-sm text-red-600">Enter a valid email.</p>
        </div>

        <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">{{ error }}</div>

        <div>
          <button 
            type="submit" 
            [disabled]="loading" 
            class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-full shadow-md text-sm font-medium text-white bg-brand-teal hover:bg-brand-teal/90 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-teal transform hover:-translate-y-0.5 transition-all duration-200 disabled:opacity-60">
            <i class="fas fa-envelope"></i> {{ loading ? 'Sending...' : 'Send Reset Link' }}
          </button>
        </div>

        <div class="text-center">
          <button 
            type="button"
            (click)="backToLogin()" 
            class="text-sm text-brand-orange hover:text-brand-teal transition-colors font-medium">
            Back to login
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
