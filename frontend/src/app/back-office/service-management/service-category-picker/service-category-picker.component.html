<div class="min-h-screen bg-gradient-to-br from-[#f0f4ff] via-[#fdf2f8] to-[#f0fff4] py-16 px-6">
  <div class="max-w-6xl mx-auto">

    <!-- Back button -->
    <button (click)="goBack()" class="service-card py-2 px-4 inline-flex items-center gap-2 mb-10 text-gray-600 hover:text-brand-teal transition-colors">
      <span class="text-xl">←</span>
      <span class="font-semibold text-sm uppercase tracking-wider">Retour aux services</span>
    </button>

    <!-- Header -->
    <div class="text-center mb-16">
      <div class="text-6xl mb-6 animate-float inline-block">🐾</div>
      <h1 class="text-5xl font-black mb-4 bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">
        Choisissez une catégorie
      </h1>
      <p class="text-lg text-gray-500 max-w-2xl mx-auto">
        Prêt à proposer un nouveau service ? Sélectionnez le type d'expertise que vous souhaitez mettre en avant aujourd'hui.
      </p>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let i of [1,2,3,4,5,6]" class="service-card h-64 animate-pulse bg-white/50 border-dashed border-2 flex flex-col justify-center items-center">
        <div class="w-16 h-16 bg-gray-200 rounded-2xl mb-4"></div>
        <div class="w-3/4 h-6 bg-gray-200 rounded-lg mb-2"></div>
        <div class="w-1/2 h-4 bg-gray-200 rounded-lg"></div>
      </div>
    </div>

    <!-- Category Cards Grid -->
    <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <button
        *ngFor="let cat of categories"
        class="service-card group relative overflow-hidden flex flex-col items-start text-left"
        [ngClass]="'card-border-' + cat.name.toUpperCase() + ' hover-bg-' + cat.name.toUpperCase()"
        (click)="selectCategory(cat)"
        [id]="'cat-card-' + cat.name.toLowerCase()"
      >
        <div class="text-5xl mb-6 transition-transform duration-300 group-hover:scale-125 group-hover:-rotate-6">
          {{ cat.icon }}
        </div>
        
        <h3 class="text-2xl font-bold text-gray-900 mb-3">
          {{ cat.label }}
        </h3>
        
        <p class="text-gray-500 leading-relaxed mb-6 flex-grow">
          {{ cat.description }}
        </p>
        
        <div class="flex items-center gap-2 text-indigo-600 font-bold opacity-0 translate-x-[-10px] transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0">
          <span>Continuer</span>
          <span class="text-xl">→</span>
        </div>
      </button>
    </div>

    <!-- Empty state -->
    <div *ngIf="!loading && categories.length === 0" class="text-center py-20 bg-white/40 rounded-3xl backdrop-blur-sm border-2 border-dashed border-gray-200">
      <div class="text-6xl mb-6 opacity-30">🐾</div>
      <h3 class="text-2xl font-bold text-gray-600 mb-2">Aucune catégorie disponible</h3>
      <p class="text-gray-400">Veuillez contacter un administrateur pour ajouter des catégories.</p>
    </div>

  </div>
</div>
