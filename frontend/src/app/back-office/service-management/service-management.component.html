<ng-container *ngIf="!isAdminRoute">
  <app-navbar></app-navbar>
  <div class="min-h-screen bg-gray-50">
    <router-outlet></router-outlet>
  </div>
</ng-container>

<ng-container *ngIf="isAdminRoute">
  <div class="flex h-screen overflow-hidden bg-gray-100">
    <app-sidebar [isOpen]="true"></app-sidebar>
    
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="bg-white shadow-sm z-10 px-6 py-4 border-b border-gray-200">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs font-semibold text-indigo-600 uppercase tracking-wider mb-1">Back Office</p>
            <h1 class="text-xl font-bold text-gray-900">Service Providers</h1>
          </div>
          <div class="flex items-center space-x-4">
            <div class="h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold border-2 border-indigo-200">
              AD
            </div>
          </div>
        </div>
      </header>
      
      <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-container>
