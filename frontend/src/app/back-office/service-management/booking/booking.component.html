<div class="container mx-auto px-6 py-6">
  <h2 class="text-2xl font-bold mb-4">Bookings for this service</h2>

  <!-- 🔄 Loading -->
  <div *ngIf="loading" class="text-center py-12">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
    <span class="text-gray-600 ml-2">Loading...</span>
  </div>

  <!-- 📋 Table -->
  <table *ngIf="!loading && (bookings$ | async) as bookings"
         class="min-w-full divide-y divide-gray-200">

    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Client</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Pet</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
      </tr>
    </thead>

    <tbody class="bg-white divide-y divide-gray-200">

      <!-- 🔴 If no bookings -->
      <tr *ngIf="bookings.length === 0">
        <td colspan="6" class="text-center py-10 text-gray-500">
          No bookings found
        </td>
      </tr>

      <!-- ✅ List -->
      <tr *ngFor="let booking of bookings">

        <!-- 👤 CLIENT NAME -->
        <td class="px-6 py-4 whitespace-nowrap">
          {{ booking.user?.firstName || booking.user?.username || 'Unknown' }}
          {{ booking.user?.lastName || '' }}
        </td>

        <!-- 🐶 PET -->
        <td class="px-6 py-4 whitespace-nowrap">
          {{ booking.petName }}
        </td>

        <!-- 🐾 TYPE -->
        <td class="px-6 py-4 whitespace-nowrap">
          {{ booking.petType }}
        </td>

        <!-- 📅 DATE -->
        <td class="px-6 py-4 whitespace-nowrap">
          {{ formatDate(booking.bookingDate) }}
        </td>

        <!-- 📌 STATUS -->
        <td class="px-6 py-4 whitespace-nowrap">
          <span
            [ngClass]="{
              'text-green-600 font-semibold': booking.status === 'ACCEPTED',
              'text-red-600 font-semibold': booking.status === 'REJECTED',
              'text-yellow-600 font-semibold': booking.status === 'PENDING'
            }">
            {{ booking.status }}
          </span>
        </td>

        <!-- ⚙️ ACTIONS -->
        <td class="px-6 py-4 whitespace-nowrap text-right">

          <button *ngIf="booking.status !== 'ACCEPTED'"
                  (click)="updateBookingStatus(booking, 'ACCEPTED')"
                  class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded">
            Accept
          </button>

          <button *ngIf="booking.status !== 'REJECTED'"
                  (click)="updateBookingStatus(booking, 'REJECTED')"
                  class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded ml-2">
            Reject
          </button>

        </td>
      </tr>

    </tbody>
  </table>
</div>
