<div class="p-6 lg:p-10 max-w-7xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800 flex items-center space-x-3">
      <i class="fas fa-clinic-medical text-brand-orange text-4xl"></i>
      <span>Clinic Management</span>
    </h1>
    <p class="text-gray-600 mt-2">Manage clinic settings and configuration</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Settings Sidebar -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden sticky top-6">
        <nav class="divide-y divide-gray-100">
          <button class="w-full text-left px-6 py-4 flex items-center space-x-3 hover:bg-gray-50 transition-colors bg-brand-teal/10 text-brand-teal font-semibold">
            <i class="fas fa-building"></i>
            <span>Clinic Info</span>
          </button>
          <button class="w-full text-left px-6 py-4 flex items-center space-x-3 hover:bg-gray-50 transition-colors text-gray-700">
            <i class="fas fa-door-open"></i>
            <span>Operating Hours</span>
          </button>
          <button class="w-full text-left px-6 py-4 flex items-center space-x-3 hover:bg-gray-50 transition-colors text-gray-700">
            <i class="fas fa-user-tie"></i>
            <span>Staff Management</span>
          </button>
          <button class="w-full text-left px-6 py-4 flex items-center space-x-3 hover:bg-gray-50 transition-colors text-gray-700">
            <i class="fas fa-wand-magic-sparkles"></i>
            <span>Services Offered</span>
          </button>
          <button class="w-full text-left px-6 py-4 flex items-center space-x-3 hover:bg-gray-50 transition-colors text-gray-700">
            <i class="fas fa-lock"></i>
            <span>Security</span>
          </button>
        </nav>
      </div>
    </div>

    <!-- Settings Content -->
    <div class="lg:col-span-2 space-y-6">
      <!-- Clinic Info Card -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center space-x-2">
          <i class="fas fa-building text-brand-teal"></i>
          <span>Clinic Information</span>
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Clinic Name</label>
            <input type="text" value="Sunshine Vet Clinic" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-teal focus:border-transparent">
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
              <input type="tel" value="(555) 123-4567" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-teal focus:border-transparent">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
              <input type="email" value="contact@sunshinevetclinic.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-teal focus:border-transparent">
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Full Address</label>
            <input type="text" value="123 Pet Street, Downtown" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-teal focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Clinic Description</label>
            <textarea rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-teal focus:border-transparent">Family-owned veterinary clinic dedicated to providing exceptional care for pets of all kinds.</textarea>
          </div>
          <app-button text="Save Changes" variant="primary" [fullWidth]="true"></app-button>
        </div>
      </div>
    </div>
  </div>
</div>
