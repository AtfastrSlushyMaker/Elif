<div class="p-6 lg:p-10 max-w-7xl mx-auto">
  <div class="mb-8 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold text-gray-800 flex items-center space-x-3">
        <i class="fas fa-paw text-brand-orange text-4xl"></i>
        <span>Patient Database</span>
      </h1>
      <p class="text-gray-600 mt-1">Search and manage all registered pets</p>
    </div>
    <app-button text="Register New Patient" variant="primary"></app-button>
  </div>

  <!-- Search & Filters -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <input type="text" placeholder="Search by pet name or owner..." class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-teal focus:border-transparent">
      <select class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-teal focus:border-transparent">
        <option>All Types</option>
        <option>Cat</option>
        <option>Dog</option>
        <option>Rabbit</option>
        <option>Bird</option>
      </select>
      <button class="px-4 py-2 bg-brand-teal text-white rounded-lg hover:bg-brand-teal/90 transition-colors flex items-center justify-center space-x-2">
        <i class="fas fa-search"></i>
        <span>Search</span>
      </button>
    </div>
  </div>

  <!-- Patients Table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Pet Name</th>
          <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Owner</th>
          <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Type</th>
          <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Age</th>
          <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Last Visit</th>
          <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 text-sm">
            <div class="flex items-center space-x-3">
              <div class="w-8 h-8 rounded-full bg-brand-yellow/30 flex items-center justify-center">
                <i class="fas fa-cat text-brand-orange"></i>
              </div>
              <span class="font-semibold text-gray-800">Milo</span>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">Mark Thompson</td>
          <td class="px-6 py-4 text-sm text-gray-600">
            <span class="px-2 py-1 bg-brand-yellow/20 text-brand-orange text-xs font-bold rounded">Cat</span>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">3 years</td>
          <td class="px-6 py-4 text-sm text-gray-600">Feb 28, 2026</td>
          <td class="px-6 py-4 text-sm">
            <div class="flex space-x-2">
              <button class="text-brand-teal hover:text-brand-teal/80 transition-colors">
                <i class="fas fa-eye"></i>
              </button>
              <button class="text-brand-orange hover:text-brand-orange/80 transition-colors">
                <i class="fas fa-edit"></i>
              </button>
              <button class="text-brand-red hover:text-brand-red/80 transition-colors">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </td>
        </tr>

        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 text-sm">
            <div class="flex items-center space-x-3">
              <div class="w-8 h-8 rounded-full bg-brand-peach/30 flex items-center justify-center">
                <i class="fas fa-dog text-brand-orange"></i>
              </div>
              <span class="font-semibold text-gray-800">Bella</span>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">Sarah Jenkins</td>
          <td class="px-6 py-4 text-sm text-gray-600">
            <span class="px-2 py-1 bg-brand-peach text-brand-orange text-xs font-bold rounded">Dog</span>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">1 year</td>
          <td class="px-6 py-4 text-sm text-gray-600">Mar 1, 2026</td>
          <td class="px-6 py-4 text-sm">
            <div class="flex space-x-2">
              <button class="text-brand-teal hover:text-brand-teal/80 transition-colors">
                <i class="fas fa-eye"></i>
              </button>
              <button class="text-brand-orange hover:text-brand-orange/80 transition-colors">
                <i class="fas fa-edit"></i>
              </button>
              <button class="text-brand-red hover:text-brand-red/80 transition-colors">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </td>
        </tr>

        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 text-sm">
            <div class="flex items-center space-x-3">
              <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                <i class="fas fa-rabbit text-blue-600"></i>
              </div>
              <span class="font-semibold text-gray-800">Hoppy</span>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">Jennifer Wu</td>
          <td class="px-6 py-4 text-sm text-gray-600">
            <span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs font-bold rounded">Rabbit</span>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">2 years</td>
          <td class="px-6 py-4 text-sm text-gray-600">Jan 15, 2026</td>
          <td class="px-6 py-4 text-sm">
            <div class="flex space-x-2">
              <button class="text-brand-teal hover:text-brand-teal/80 transition-colors">
                <i class="fas fa-eye"></i>
              </button>
              <button class="text-brand-orange hover:text-brand-orange/80 transition-colors">
                <i class="fas fa-edit"></i>
              </button>
              <button class="text-brand-red hover:text-brand-red/80 transition-colors">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
