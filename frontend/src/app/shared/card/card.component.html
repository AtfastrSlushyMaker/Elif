<div class="bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow duration-300 overflow-hidden border border-gray-100 flex flex-col h-full" [ngClass]="customClasses">
  <div *ngIf="image" class="w-full h-48 overflow-hidden rounded-t-2xl">
    <img [src]="image" [alt]="title" class="w-full h-full object-cover">
  </div>

  <div class="p-6 flex-grow flex flex-col">
    <div class="flex justify-between items-start mb-2" *ngIf="title || badge">
      <h3 class="text-xl font-bold text-gray-800" *ngIf="title">{{ title }}</h3>
      <span *ngIf="badge" class="px-3 py-1 bg-brand-peach text-brand-orange text-xs font-bold rounded-full">
        {{ badge }}
      </span>
    </div>

    <p class="text-gray-600 text-sm mb-4 flex-grow" *ngIf="subtitle">{{ subtitle }}</p>

    <div class="mt-auto">
      <ng-content></ng-content>
    </div>
  </div>
</div>
