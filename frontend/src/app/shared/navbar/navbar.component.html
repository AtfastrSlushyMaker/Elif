<nav class="bg-white/95 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50 shadow-sm transition-all duration-300">
  <div class="container mx-auto px-4 sm:px-6 lg:px-10 flex items-center justify-between h-20 sm:h-24">
    <!-- Logo -->
    <a routerLink="/app" class="flex items-center group">
      <img src="images/logo/logo-cropped-transparent.png" alt="Elif" class="h-16 md:h-20 w-auto object-contain transform group-hover:scale-105 transition-transform duration-300 drop-shadow-sm">
    </a>

    <!-- Navigation -->
    <div *ngIf="!compactNav" class="hidden md:flex items-center gap-2 flex-wrap justify-end">
      <a
        *ngFor="let link of visibleFrontOfficeLinks"
        [routerLink]="link.path"
        routerLinkActive="bg-brand-teal/10 text-brand-teal font-semibold"
        [routerLinkActiveOptions]="{ exact: !!link.exact }"
        class="px-4 py-2.5 rounded-full text-sm font-medium text-gray-600 hover:text-brand-teal hover:bg-gray-50 transition-all duration-200 flex items-center gap-2"
      >
        <ng-container [ngSwitch]="link.iconType">
          <mat-icon *ngSwitchCase="'material'" class="opacity-70 text-[18px] w-[18px] h-[18px]">{{ link.icon }}</mat-icon>
          <i *ngSwitchDefault class="fas opacity-70" [ngClass]="link.icon"></i>
        </ng-container>
        {{ link.label }}
      </a>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <div *ngIf="currentUser" class="relative">
        <button
          (click)="toggleNotifications()"
          class="relative w-10 h-10 rounded-full border border-gray-200 bg-white text-gray-600 hover:text-brand-teal hover:border-brand-teal/40 hover:bg-brand-teal/5 transition-colors flex items-center justify-center"
          aria-label="Open notifications"
        >
          <i class="fas fa-bell"></i>
          <span
            *ngIf="unreadNotificationCount > 0"
            class="absolute -top-1 -right-1 min-w-[18px] h-[18px] rounded-full bg-brand-orange text-white text-[10px] font-bold flex items-center justify-center px-1"
          >
            {{ unreadNotificationCount > 99 ? '99+' : unreadNotificationCount }}
          </span>
        </button>

        <div *ngIf="notificationsOpen" class="absolute right-0 mt-2 w-[22rem] max-w-[90vw] rounded-2xl border border-gray-200 bg-white shadow-xl overflow-hidden">
          <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
            <h3 class="text-sm font-semibold text-gray-800">Notifications</h3>
            <div class="flex items-center gap-3">
              <button
                *ngIf="unreadNotificationCount > 0"
                (click)="markAllNotificationsRead()"
                class="text-xs font-medium text-brand-teal hover:text-teal-700"
              >
                Mark all read
              </button>
              <button
                *ngIf="recentNotifications.length > 0"
                (click)="clearNotificationsTray()"
                class="text-xs font-medium text-gray-500 hover:text-gray-700"
              >
                Clear tray
              </button>
            </div>
          </div>

          <div *ngIf="recentNotifications.length === 0" class="px-4 py-6 text-sm text-gray-500 text-center">
            No notifications yet.
          </div>

          <button
            *ngFor="let item of recentNotifications"
            (click)="openNotification(item)"
            class="w-full text-left px-4 py-3 border-b border-gray-50 hover:bg-brand-teal/5 transition-colors"
            [ngClass]="{ 'bg-brand-teal/5': !item.read }"
          >
            <div class="flex items-start gap-3">
              <span class="mt-1 w-2 h-2 rounded-full bg-brand-orange" *ngIf="!item.read"></span>
              <span class="mt-1 w-2 h-2 rounded-full bg-transparent" *ngIf="item.read"></span>
              <div class="min-w-0 flex-1">
                <p class="text-sm font-semibold text-gray-800 truncate">{{ item.title }}</p>
                <p class="text-xs text-gray-600 mt-0.5 line-clamp-2">{{ item.message }}</p>
                <p class="text-[11px] text-gray-400 mt-1">{{ formatNotificationTime(item.createdAt) }}</p>
              </div>
              <button
                (click)="clearNotification(item, $event)"
                class="text-gray-300 hover:text-gray-500 transition-colors"
                aria-label="Remove notification"
              >
                <i class="fas fa-xmark"></i>
              </button>
            </div>
          </button>
        </div>
      </div>

      <a
        routerLink="/app/marketplace/cart"
        class="relative w-10 h-10 rounded-full border border-gray-200 bg-white text-gray-600 hover:text-brand-teal hover:border-brand-teal/40 hover:bg-brand-teal/5 transition-colors flex items-center justify-center"
        aria-label="Open cart"
      >
        <i class="fas fa-cart-shopping"></i>
        <span
          *ngIf="(cartCount$ | async) as cartCount"
          class="absolute -top-1 -right-1 min-w-[18px] h-[18px] rounded-full bg-brand-orange text-white text-[10px] font-bold flex items-center justify-center px-1"
        >
          {{ cartCount }}
        </span>
      </a>

      <a
        *ngIf="currentUser"
        routerLink="/app/marketplace/favorites"
        class="relative w-10 h-10 rounded-full border border-gray-200 bg-white text-gray-600 hover:text-rose-600 hover:border-rose-300 hover:bg-rose-50 transition-colors flex items-center justify-center"
        aria-label="Open favorite products"
      >
        <i class="fas fa-heart"></i>
      </a>

      <a *ngIf="currentUser && canSeeAdminPortal && !compactNav" routerLink="/admin" class="hidden sm:flex items-center gap-2 px-4 py-2 text-sm text-gray-500 font-medium hover:text-gray-800 transition-colors bg-gray-50 hover:bg-gray-100 rounded-full border border-gray-200">
        <i class="fas fa-shield-halved text-brand-orange"></i> Back to Admin
      </a>
      <a routerLink="/auth/login" *ngIf="!currentUser" class="hidden sm:flex px-6 py-2.5 bg-brand-teal text-white text-sm font-bold rounded-full hover:bg-teal-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 items-center gap-2 cursor-pointer">
        <span>Sign In</span>
      </a>
      <div *ngIf="currentUser" class="relative">
        <button (click)="toggleUserMenu()" class="px-4 py-2.5 text-sm font-medium text-gray-700 hover:text-brand-teal hover:bg-gray-50 rounded-full transition-all duration-200 flex items-center gap-2">
          <i class="fas fa-user-circle text-brand-teal"></i>
          <span class="hidden lg:inline">{{ currentUser.firstName }} {{ currentUser.lastName }}</span>
          <i class="fas text-xs opacity-60" [ngClass]="userMenuOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
        </button>

        <div *ngIf="userMenuOpen" class="absolute right-0 mt-2 w-56 rounded-2xl border border-gray-200 bg-white shadow-xl p-2">
          <a *ngIf="canSeeDashboardShortcut" routerLink="/app/dashboard" (click)="userMenuOpen = false" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:text-brand-teal hover:bg-brand-teal/5 rounded-xl transition-colors">
            <i class="fas fa-chart-pie text-gray-400"></i> Dashboard
          </a>
          <a *ngIf="canSeeInboxShortcut" routerLink="/app/community/inbox" (click)="userMenuOpen = false" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:text-brand-teal hover:bg-brand-teal/5 rounded-xl transition-colors">
            <i class="fas fa-inbox text-gray-400"></i> Inbox
          </a>
          <a *ngIf="currentUser" routerLink="/app/marketplace/favorites" (click)="userMenuOpen = false" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-colors">
            <i class="fas fa-heart text-gray-400"></i> Favorite Products
          </a>
          <a routerLink="/app/pets" (click)="userMenuOpen = false" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:text-brand-teal hover:bg-brand-teal/5 rounded-xl transition-colors">
            <i class="fas fa-paw text-gray-400"></i> My Pets
          </a>


          <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:text-brand-teal hover:bg-brand-teal/5 rounded-xl transition-colors text-left">
            <i class="fas fa-sign-out-alt text-gray-400"></i> Logout
          </button>
        </div>
      </div>

      <!-- Mobile Menu Button -->
      <button *ngIf="compactNav" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-600 hover:text-brand-teal hover:bg-brand-teal/10 transition-colors" (click)="toggleMobileMenu()" aria-label="Toggle navigation menu">
        <i class="fas" [ngClass]="mobileMenuOpen ? 'fa-xmark text-lg' : 'fa-bars'"></i>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="mobileMenuOpen" class="border-t border-gray-100 bg-white/95 backdrop-blur-md px-6 py-4 space-y-2 shadow-lg absolute w-full left-0">
    <a routerLink="/app/marketplace/cart" (click)="mobileMenuOpen = false" class="flex items-center justify-between py-3 px-4 text-sm text-gray-700 hover:text-brand-teal font-medium hover:bg-brand-teal/5 rounded-xl transition-colors">
      <span class="flex items-center gap-3">
        <span class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fas fa-cart-shopping"></i></span>
        Cart
      </span>
      <span *ngIf="(cartCount$ | async) as cartCount" class="min-w-[20px] h-5 rounded-full bg-brand-orange text-white text-[11px] font-bold flex items-center justify-center px-1.5">{{ cartCount }}</span>
    </a>

    <ng-container *ngFor="let link of visibleFrontOfficeLinks">
      <a [routerLink]="link.path" (click)="mobileMenuOpen = false" class="flex items-center gap-3 py-3 px-4 text-sm text-gray-700 hover:text-brand-teal font-medium hover:bg-brand-teal/5 rounded-xl transition-colors">
        <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400">
          <ng-container [ngSwitch]="link.iconType">
            <mat-icon *ngSwitchCase="'material'" class="text-[18px] w-[18px] h-[18px]">{{ link.icon }}</mat-icon>
            <i *ngSwitchDefault class="fas" [ngClass]="link.icon"></i>
          </ng-container>
        </div>
        {{ link.label }}
      </a>
    </ng-container>
    <a *ngIf="currentUser" routerLink="/app/community/inbox" (click)="mobileMenuOpen = false" class="flex items-center gap-3 py-3 px-4 text-sm text-gray-700 hover:text-brand-teal font-medium hover:bg-brand-teal/5 rounded-xl transition-colors">
      <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fas fa-inbox"></i></div> Inbox
    </a>
    <a *ngIf="currentUser && canSeeDashboardShortcut" routerLink="/app/dashboard" (click)="mobileMenuOpen = false" class="flex items-center gap-3 py-3 px-4 text-sm text-gray-700 hover:text-brand-teal font-medium hover:bg-brand-teal/5 rounded-xl transition-colors">
      <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fas fa-chart-pie"></i></div> Dashboard
    </a>
    <a *ngIf="currentUser" routerLink="/app/marketplace/favorites" (click)="mobileMenuOpen = false" class="flex items-center gap-3 py-3 px-4 text-sm text-gray-700 hover:text-rose-600 font-medium hover:bg-rose-50 rounded-xl transition-colors">
      <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fas fa-heart"></i></div> Favorite Products
    </a>
    <a *ngIf="currentUser" routerLink="/app/pets" (click)="mobileMenuOpen = false" class="flex items-center gap-3 py-3 px-4 text-sm text-gray-700 hover:text-brand-teal font-medium hover:bg-brand-teal/5 rounded-xl transition-colors">
      <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fas fa-paw"></i></div> My Pets
    </a>
    <div class="h-px bg-gray-100 my-2"></div>
    <a *ngIf="currentUser && canSeeAdminPortal" routerLink="/admin" (click)="mobileMenuOpen = false" class="flex items-center gap-3 py-3 px-4 text-sm text-gray-700 hover:text-brand-orange font-medium hover:bg-brand-orange/5 rounded-xl transition-colors">
      <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-brand-orange/50"><i class="fas fa-shield-halved"></i></div> Back to Admin
    </a>
    <a *ngIf="!currentUser" routerLink="/auth/login" (click)="mobileMenuOpen = false" class="flex items-center gap-3 py-3 px-4 text-sm text-white bg-brand-teal hover:bg-teal-700 font-semibold rounded-xl transition-colors">
      <div class="w-8 h-8 rounded-full bg-white/15 flex items-center justify-center"><i class="fas fa-right-to-bracket"></i></div> Sign In
    </a>
  </div>
</nav>
