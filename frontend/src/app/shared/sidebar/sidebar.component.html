<aside
  class="admin-sidebar h-screen flex flex-col fixed lg:sticky top-0 left-0 z-20 max-w-[86vw] lg:max-w-none overflow-hidden transition-all duration-300 ease-in-out"
  [ngClass]="isOpen
    ? 'translate-x-0 w-72 lg:w-72 border-r border-[#d7e1ea]'
    : '-translate-x-full w-72 lg:translate-x-0 lg:w-0 border-r-0 shadow-none'"
>
  <div class="sidebar-top">
    <div class="flex items-center gap-3 min-w-0">
      <img src="images/logo/logo-cropped-transparent.png" alt="Elif Admin" class="h-10 w-auto">
      <div class="min-w-0">
        <p class="brand-name">Elif Console</p>
        <p class="brand-subline">Platform Administration</p>
      </div>
    </div>
  </div>

  <div class="px-5 py-5">
    <p class="menu-label">Main Menu</p>
    <nav class="space-y-2">
      <a
        *ngFor="let link of adminLinks"
        [routerLink]="link.path"
        [ngClass]="isActive(link.path)
          ? 'sidebar-link sidebar-link-active'
          : 'sidebar-link sidebar-link-idle'"
      >
        <i class="text-lg w-5 text-center" [ngClass]="link.icon"></i>
        <span>{{ link.label }}</span>
      </a>
    </nav>
  </div>

  <div class="mt-auto px-5 pb-5 pt-4 border-t border-slate-200">
    <a
      [routerLink]="['/app']"
      [queryParams]="{ allowPortal: 1 }"
      class="footer-action footer-action-primary"
    >
      <i class="fas fa-arrow-right text-sm"></i>
      <span>Front Office</span>
    </a>

    <button
      type="button"
      (click)="logout()"
      class="footer-action footer-action-danger mt-2 w-full"
    >
      <i class="fas fa-right-from-bracket text-sm"></i>
      <span>Logout</span>
    </button>
  </div>
</aside>
