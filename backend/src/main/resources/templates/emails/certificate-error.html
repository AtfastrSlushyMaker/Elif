<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Error</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #f5f5f5;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #0f172a;
        }
        .card {
            width: min(560px, 100%);
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        h1  { margin: 0 0 14px; font-size: 26px; font-weight: 600; }
        p   { margin: 0; color: #475569; line-height: 1.7; font-size: 15px; }
        .hint { margin-top: 14px; color: #64748b; font-size: 13px; }
    </style>
</head>
<body>
<article class="card">
    <h1 th:text="${title}">Error</h1>
    <p  th:text="${message}">Something went wrong.</p>
    <p  class="hint" th:text="${hint}">Please try again.</p>
</article>
</body>
</html>
