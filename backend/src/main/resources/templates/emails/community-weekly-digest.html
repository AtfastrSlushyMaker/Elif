<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Community Weekly Digest</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #f6f8fb; font-family: 'Segoe UI', Arial, sans-serif; color: #0f172a; }
        .shell { padding: 28px 14px; }
        .card { max-width: 680px; margin: 0 auto; background: #ffffff; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08); }
        .hero { padding: 34px 38px; background: linear-gradient(135deg, #f7fbfa 0%, #e4f3ef 46%, #fff3e2 100%); border-bottom: 1px solid #dbe7e3; }
        .hero .kicker { color: #0f766e; font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
        .hero h1 { margin: 14px 0 10px; font-size: 31px; line-height: 1.08; }
        .hero p { margin: 0; color: #475569; font-size: 14px; line-height: 1.7; }
        .body { padding: 28px 38px 20px; }
        .post-card { padding: 18px 0; border-bottom: 1px solid #edf2f7; }
        .post-card:last-child { border-bottom: none; }
        .meta { font-size: 12px; color: #64748b; margin-bottom: 8px; }
        .post-card h2 { margin: 0 0 8px; font-size: 20px; line-height: 1.3; }
        .post-card p { margin: 0 0 14px; font-size: 14px; line-height: 1.7; color: #475569; }
        .statline { font-size: 12px; color: #64748b; margin-bottom: 12px; }
        .link { color: #0f766e !important; text-decoration: none; font-weight: 700; }
        .footer { padding: 12px 38px 34px; }
        .footer-cta { display: inline-block; padding: 14px 24px; border-radius: 999px; background: #0f766e; color: #ffffff !important; text-decoration: none; font-size: 14px; font-weight: 700; }
        .muted { margin-top: 18px; color: #64748b; font-size: 12px; line-height: 1.7; }
        .muted a { color: #0f766e; text-decoration: none; font-weight: 600; }
        @media (max-width: 600px) {
            .hero, .body, .footer { padding-left: 22px; padding-right: 22px; }
            .hero h1 { font-size: 26px; }
            .post-card h2 { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="card">
        <div class="hero">
            <div class="kicker">Weekly digest</div>
            <h1 th:text="${headline}">Community weekly digest</h1>
            <p>
                Hi <strong th:text="${firstName}">there</strong>, here is the conversation snapshot for
                <strong th:text="${communityName}">your community</strong>
                <span th:text="${digestRange}">this week</span>.
            </p>
        </div>
        <div class="body">
            <div class="post-card" th:each="post : ${posts}">
                <div class="meta">
                    <span th:text="${post.authorName}">Community member</span>
                    &nbsp;·&nbsp;
                    <span th:text="${post.dateLabel}">Apr 23</span>
                </div>
                <h2 th:text="${post.title}">Post title</h2>
                <p th:text="${post.excerpt}">Post preview</p>
                <div class="statline">
                    <span th:text="${post.voteScore}">0</span> votes
                    &nbsp;·&nbsp;
                    <span th:text="${post.commentCount}">0</span> comments
                </div>
                <a class="link" th:href="${post.postUrl}">Open discussion</a>
            </div>
        </div>
        <div class="footer">
            <a class="footer-cta" th:href="${communityUrl}">Open community</a>
            <p class="muted">
                Want fewer emails? <a th:href="${manageUrl}">Manage digest settings</a>
                &nbsp;·&nbsp;
                <a th:href="${baseUrl}">Open Elif</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
