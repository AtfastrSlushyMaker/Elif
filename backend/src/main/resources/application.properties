spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties],optional:file:../backend/.env[.properties],optional:file:../.env[.properties]

spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/Elif?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# Server configuration
server.port=8087
server.servlet.context-path=/elif

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}

# OpenAI
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o

# Mail (SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}
app.backend.base-url=${APP_BACKEND_BASE_URL:http://localhost:8087/elif}

# Google Sign-In (Web client ID ? same value as Angular environment.googleClientId)
app.google.client-id=${GOOGLE_CLIENT_ID:}
logging.level.org.springframework.mail=DEBUG

# Giphy GIF API
giphy.api-key=${GIPHY_API_KEY:}

# Gemini AI
app.ai.gemini.enabled=${GEMINI_ENABLED:true}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# AI Thread Summary (Groq)
app.ai.summary.enabled=${APP_AI_SUMMARY_ENABLED:true}
app.ai.groq.api-key=${GROQ_API_KEY:}
app.ai.groq.model=${GROQ_MODEL:llama-3.1-8b-instant}
app.ai.groq.vision-model=${GROQ_VISION_MODEL:llama-3.2-11b-vision-preview}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
app.ai.summary.max-comments=${APP_AI_SUMMARY_MAX_COMMENTS:160}
app.ai.summary.max-input-chars=${APP_AI_SUMMARY_MAX_INPUT_CHARS:18000}

# Upload configuration
app.upload.base-dir=uploads
file.upload-dir=./uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# PDF storage for generated contracts
app.contracts.dir=./uploads/contracts

# Notifications

# Disable broad feed noise by default; replies/comments/chat notifications remain enabled.
app.notifications.community.new-post.enabled=${APP_NOTIFICATIONS_COMMUNITY_NEW_POST_ENABLED:false}
app.notifications.community.weekly-digest.cron=${APP_NOTIFICATIONS_COMMUNITY_WEEKLY_DIGEST_CRON:0 0 9 * * MON}
ocr.service.url=http://localhost:8000
# src/main/resources/application.properties

# AI Gemini Configuration
ai.gemini.api-key=${GEMINI_API_KEY:}
ai.gemini.model=gemini-2.0-flash
ai.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models
ai.gemini.max-tokens=1024
ai.gemini.temperature=0.7
# GROQ API (gratuit)
ai.groq.api-key=${GROQ_API_KEY:}
ai.groq.model=llama-3.1-8b-instant
ai.groq.api-url=https://api.groq.com/openai/v1/chat/completions
ai.groq.max-tokens=2048
ai.groq.temperature=0.7
# Ajouter ces lignes dans application.properties
# OpenWeatherMap API Configuration
weather.api.key=${WEATHER_API_KEY:}
weather.api.url=https://api.openweathermap.org/data/2.5
# Async timeout
spring.mvc.async.request-timeout=120000