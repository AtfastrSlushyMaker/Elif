spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/Elif?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Server configuration :
server.port=8087
server.servlet.context-path=/elif

# Upload configuration
app.upload.base-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# OpenWeatherMap
weather.api.key=f230a4580b30c8d5d698b45db2c8d8f7
weather.api.url=https://api.openweathermap.org/data/2.5

# Mail (rappels)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@elif-petcare.com

