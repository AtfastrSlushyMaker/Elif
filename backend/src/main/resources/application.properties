spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties],optional:file:../backend/.env[.properties],optional:file:../.env[.properties]

spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/Elif?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# Server configuration :
server.port=8087
server.servlet.context-path=/elif

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}

# Mail (SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}

# Giphy GIF API
giphy.api-key=${GIPHY_API_KEY:}

# Upload configuration
app.upload.base-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
