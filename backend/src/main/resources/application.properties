spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/Elif?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Server configuration :
server.port=8087
server.servlet.context-path=/elif